{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2024,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      {% if nuts_level %}nutsLevel: parseInt('{{ nuts_level }}', 10),{% endif %}
      title:       'Share of organic fractions in total waste (Organic / (organic + residual))',
      dataUrl:     '/waste_collection/api/waste-atlas/organic-waste-ratio/',
      dataField:   '_classified',
      categories: [
        { value: 'very_high', label: '> 0.66 (much more organic than residual)', exportLabel: '> 0.66 organic-dominant', color: '#0868ac' },
        { value: 'high',      label: '0.51–0.66 (More organic than residual)', exportLabel: '0.51–0.66 organic > residual', color: '#43a2ca' },
        { value: 'medium',    label: '0.34–0.50 (More residual than organic)', exportLabel: '0.34–0.50 residual > organic', color: '#7bccc4' },
        { value: 'low',       label: '0.00–0.33 (Low organic share)', exportLabel: '0.00–0.33 low organic share', color: '#bae4bc' }
      ],
      noDataColor: '#e0e0e0',
      noDataLabel: 'No data',
      legendTitle: 'Organic / (organic + residual)',
      fileBase:    'organic_waste_ratio',
      transformData: function (records) {
        return records.map(function (r) {
          var cls;
          if (r.ratio === null) {
            cls = null;
          } else if (r.ratio > 0.66) {
            cls = 'very_high';
          } else if (r.ratio > 0.50) {
            cls = 'high';
          } else if (r.ratio > 0.33) {
            cls = 'medium';
          } else {
            cls = 'low';
          }
          return { catchment_id: r.catchment_id, _classified: cls };
        });
      }
    });
  });
  </script>
{% endblock atlas_config %}
