{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2024,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      {% if nuts_level %}nutsLevel: parseInt('{{ nuts_level }}', 10),{% endif %}
      title:       'Number of collection points',
      dataUrl:     '/waste_collection/api/waste-atlas/collection-point-count/',
      dataField:   '_classified',
      categories: [
        { value: 'high',      label: '> 10',  color: '#d95f0e' },
        { value: 'medium',    label: '6 – 10', color: '#fe9929' },
        { value: 'low',       label: '2 – 5',  color: '#fed98e' },
        { value: 'very_low',  label: 'Collection point',      color: '#ffffd4' },
        { value: 'full_dtd',  label: 'Full door-to-door/No data', color: '#74c476' }
      ],
      noDataColor: '#e0e0e0',
      noDataLabel: 'No data',
      legendTitle: 'Collection points',
      fileBase:    'collection_point_count',
      transformData: function (records) {
        return records.map(function (r) {
          var value = r.collection_point_count;
          var cls;
          if (value === null || value === undefined) {
            cls = r.is_door_to_door ? 'full_dtd' : null;
          } else if (value > 10) {
            cls = 'high';
          } else if (value > 5) {
            cls = 'medium';
          } else if (value > 1) {
            cls = 'low';
          } else {
            cls = 'very_low';
          }
          return { catchment_id: r.catchment_id, _classified: cls };
        });
      }
    });
  });
  </script>
{% endblock atlas_config %}
