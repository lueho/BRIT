{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2024,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      {% if nuts_level %}nutsLevel: parseInt('{{ nuts_level }}', 10),{% endif %}
      title:       'Primary collection system for biowaste',
      dataUrl:     '/waste_collection/api/waste-atlas/collection-system/',
      dataField:   'collection_system',
      categories: [
        { value: 'Door to door',                         label: 'Door to door collection',               color: '#d0fcd5' },
        { value: 'Mixed door-to-door and bring point',   label: 'Mixed door-to-door and bring point',    color: '#a8e6cf' },
        { value: 'Recycling centre',                     label: 'Recycling centre',                      color: '#3dc79b' },
        { value: 'Bring point',                          label: 'Bring point',                           color: '#3dc7dc' },
        { value: 'No separate collection',               label: 'No separate biowaste collection',       color: '#fff696' }
      ],
      noDataColor: '#e0e0e0',
      noDataLabel: 'No data',
      legendTitle: 'Collection system',
      fileBase:    'collection_systems'
    });
  });
  </script>
{% endblock atlas_config %}
