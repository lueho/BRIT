{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
<script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2024,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      {% if nuts_level %}nutsLevel: parseInt('{{ nuts_level }}', 10),{% endif %}
      title:       'Number of green-waste collection systems per catchment',
      dataUrl:     '/waste_collection/api/waste-atlas/green-waste-collection-system-count/',
      dataField:   'collection_system_count',
      categories: [
        { label: '3 or more collection systems', color: '#1b9e77', test: function (v) { return v >= 3; } },
        { label: '2 collection systems',           color: '#66a61e', test: function (v) { return v === 2; } },
        { label: '1 collection system',            color: '#a6d854', test: function (v) { return v === 1; } }
      ],
      noDataColor: '#e0e0e0',
      noDataLabel: 'No data',
      legendTitle: 'Number of collection systems',
      fileBase:    'green_waste_collection_system_count'
    });
  });
</script>
{% endblock atlas_config %}
