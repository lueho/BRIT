{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2024,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      nutsLevel:    parseInt('{{ nuts_level|default:"1" }}', 10),
      title:       'Smallest available bin size for residual waste (L)',
      dataUrl:     '/waste_collection/api/waste-atlas/residual-min-bin-size/',
      dataField:   '_classified',
      categories: [
        { value: 'xs',      label: '≤ 30 L',    color: '#fde0dd' },
        { value: 'small',   label: '31 – 60 L',  color: '#fc9272' },
        { value: 'medium',  label: '61 – 120 L', color: '#de2d26' },
        { value: 'large',   label: '121 – 240 L', color: '#67000d' }
      ],
      noDataColor: '#e0e0e0',
      noDataLabel: 'No data',
      legendTitle: 'Min. bin size (L)',
      fileBase:    'residual_min_bin_size',
      transformData: function (records) {
        return records.map(function (r) {
          var cls;
          if (r.min_bin_size === null) {
            cls = null;
          } else if (r.min_bin_size <= 30) {
            cls = 'xs';
          } else if (r.min_bin_size <= 60) {
            cls = 'small';
          } else if (r.min_bin_size <= 120) {
            cls = 'medium';
          } else {
            cls = 'large';
          }
          return { catchment_id: r.catchment_id, _classified: cls };
        });
      }
    });
  });
  </script>
{% endblock atlas_config %}
