{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2024,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      nutsLevel:    parseInt('{{ nuts_level|default:"1" }}', 10),
      title:       'Collection frequency setting for biowaste collection',
      dataUrl:     '/waste_collection/api/waste-atlas/biowaste-frequency-type/',
      dataField:   '_classified',
      categories: [
        { value: 'Fixed-Seasonal',   label: 'Seasonally varying',                    color: '#2e8b57' },
        { value: 'Fixed-Flexible',   label: 'Flexible',                              color: '#4169e1' },
        { value: 'Fixed',            label: 'Fixed',                                 color: '#8c9eff' },
        { value: 'no_bio_collection', label: 'No door to door biowaste collection',  color: '#fff696' }
      ],
      noDataColor: '#e0e0e0',
      noDataLabel: 'No data',
      legendTitle: 'Collection frequency setting',
      fileBase:    'biowaste_collection_schedule',
      transformData: function (records) {
        var NO_BIO = ['No separate collection', 'Bring point', 'Recycling centre',
                      'On demand kerbside collection', 'Home-composting'];
        return records.map(function (r) {
          var cls = NO_BIO.indexOf(r.frequency_type) !== -1
            ? 'no_bio_collection'
            : r.frequency_type;
          return { catchment_id: r.catchment_id, _classified: cls };
        });
      }
    });
  });
  </script>
{% endblock atlas_config %}
