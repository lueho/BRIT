{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2024,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      {% if nuts_level %}nutsLevel: parseInt('{{ nuts_level }}', 10),{% endif %}
      title:       'Fee system: biowaste vs residual waste',
      dataUrl:     '/waste_collection/api/waste-atlas/combined-fee-system/',
      dataField:   '_classified',
      categories: [
        { value: 'flex_flex',       label: 'BWB & RWB: Flexible',                  exportLabel: 'BWB & RWB: Flexible',     color: '#00ced1' },
        { value: 'no_fee_flex',     label: 'BWB: No fee | RWB: Flexible',          exportLabel: 'BWB: No fee | RWB: Flexible', color: '#80e6e8' },
        { value: 'payt_payt',       label: 'BWB & RWB: PAYT',                      exportLabel: 'BWB & RWB: PAYT',         color: '#4b2a60' },
        { value: 'flex_payt',       label: 'BWB: Flexible | RWB: PAYT',            exportLabel: 'BWB: Flexible | RWB: PAYT', color: '#7b5a8c' },
        { value: 'no_fee_payt',     label: 'BWB: No fee | RWB: PAYT',              exportLabel: 'BWB: No fee | RWB: PAYT', color: '#b6a1c5' },
        { value: 'flex_flex_plus',  label: 'BWB: Flexible | RWB: Flexible+',       exportLabel: 'BWB: Flexible | RWB: Flexible+', color: '#ffd700' },
        { value: 'no_bio',          label: 'No door-to-door biowaste collection',   exportLabel: 'No D2D bio',             color: '#fff696' },
        { value: 'other_combined',  label: 'Other combinations',                   exportLabel: 'Other combinations',      color: '#4daf4a' }
      ],
      noDataColor: '#e0e0e0',
      noDataLabel: 'No data',
      legendTitle: 'Fee: bio / residual',
      fileBase:    'combined_fee_system',
      transformData: function (records) {
        return records.map(function (r) {
          var cls;
          var noSep = ['No separate collection', 'Recycling centre', 'Bring point'];
          if (noSep.indexOf(r.bio_fee) !== -1) {
            cls = 'no_bio';
          } else if (r.bio_fee === 'Flexible' && r.residual_fee === 'Flexible') {
            cls = 'flex_flex';
          } else if (r.bio_fee === 'No fee' && r.residual_fee === 'Flexible') {
            cls = 'no_fee_flex';
          } else if (r.bio_fee === 'No fee' && r.residual_fee === 'Pay as you throw (PAYT)') {
            cls = 'no_fee_payt';
          } else if (r.bio_fee === 'Pay as you throw (PAYT)' && r.residual_fee === 'Pay as you throw (PAYT)') {
            cls = 'payt_payt';
          } else if (r.bio_fee === 'Flexible' && r.residual_fee === 'Pay as you throw (PAYT)') {
            cls = 'flex_payt';
          } else if (r.bio_fee === 'Flexible' && r.residual_fee === 'Flexible+') {
            cls = 'flex_flex_plus';
          } else if (r.bio_fee && r.residual_fee && r.bio_fee !== 'no_data' && r.residual_fee !== 'no_data') {
            cls = 'other_combined';
          } else {
            cls = null;
          }
          return { catchment_id: r.catchment_id, _classified: cls };
        });
      }
    });
  });
  </script>
{% endblock atlas_config %}
