{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2024,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      {% if nuts_level %}nutsLevel: parseInt('{{ nuts_level }}', 10),{% endif %}
      title:       'Fee system: Biowaste vs Residual waste',
      dataUrl:     '/waste_collection/api/waste-atlas/combined-fee-system/',
      dataField:   '_classified',
      categories: [
        { value: 'flex_flex',    label: 'Biowaste flexible, residual waste flexible', exportLabel: 'Flexible / flexible', color: '#a6cee3' },
        { value: 'payt_payt',    label: 'Biowaste PAYT, residual waste PAYT', exportLabel: 'PAYT / PAYT', color: '#4b2a60' },
        { value: 'free_flex',    label: 'Biowaste free of charge, residual waste flexible', exportLabel: 'Free / flexible', color: '#1f78b4' },
        { value: 'other',        label: 'Other combinations',                  color: '#66c2a5' },
        { value: 'no_bio',       label: 'No separate biowaste collection', exportLabel: 'No separate bio', color: '#FFF696' }
      ],
      noDataColor: '#e0e0e0',
      noDataLabel: 'No data',
      legendTitle: 'Fee system',
      exportLegendTitle: 'Fee: bio / residual',
      fileBase:    'combined_fee_system',
      transformData: function (records) {
        function key(fee) {
          if (fee === 'Flexible' || fee === 'Flexible+') return 'flex';
          if (fee === 'Pay as you throw (PAYT)') return 'payt';
          if (fee === 'No fee') return 'free';
          if (fee === 'Flat fee') return 'flat';
          return fee;
        }
        return records.map(function (r) {
          var cls;
          if (r.bio_fee === 'No separate collection') {
            cls = 'no_bio';
          } else {
            var b = key(r.bio_fee);
            var re = key(r.residual_fee);
            if (b === 'flex' && re === 'flex') cls = 'flex_flex';
            else if (b === 'payt' && re === 'payt') cls = 'payt_payt';
            else if (b === 'free' && re === 'flex') cls = 'free_flex';
            else cls = 'other';
          }
          return { catchment_id: r.catchment_id, _classified: cls };
        });
      }
    });
  });
  </script>
{% endblock atlas_config %}
