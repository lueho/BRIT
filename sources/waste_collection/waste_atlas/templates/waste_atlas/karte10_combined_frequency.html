{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2024,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      {% if nuts_level %}nutsLevel: parseInt('{{ nuts_level }}', 10),{% endif %}
      title:       'Collection frequency type: Biowaste vs Residual waste',
      dataUrl:     '/waste_collection/api/waste-atlas/combined-frequency-type/',
      dataField:   '_classified',
      categories: [
        { value: 'bio_seasonal_res_flexible', label: 'Biowaste seasonal, Residual waste flexible', exportLabel: 'Seasonal / flexible', color: '#2e8b57' },
        { value: 'bio_flexible_res_flexible', label: 'Biowaste flexible, Residual waste flexible', exportLabel: 'Flexible / flexible', color: '#4169e1' },
        { value: 'bio_fixed_res_flexible',    label: 'Biowaste fixed, Residual waste flexible', exportLabel: 'Fixed / flexible', color: '#8c9eff' },
        { value: 'bio_seasonal_res_fixed',    label: 'Biowaste seasonal, Residual waste fixed', exportLabel: 'Seasonal / fixed', color: '#66cdaa' },
        { value: 'bio_flexible_res_fixed',    label: 'Biowaste flexible, Residual waste fixed', exportLabel: 'Flexible / fixed', color: '#e08840' },
        { value: 'bio_fixed_res_fixed',       label: 'Biowaste fixed, Residual waste fixed', exportLabel: 'Fixed / fixed', color: '#b0b0ff' },
        { value: 'no_bio_collection',         label: 'No Door to door Biowaste collection', exportLabel: 'No D2D bio', color: '#fff696' }
      ],
      noDataColor: '#e0e0e0',
      noDataLabel: 'No data',
      legendTitle: 'Collection schedule',
      exportLegendTitle: 'Schedule: bio / residual',
      fileBase:    'combined_collection_schedule',
      transformData: function (records) {
        var TYPE_KEY = {
          'Fixed':          'fixed',
          'Fixed-Flexible': 'flexible',
          'Fixed-Seasonal': 'seasonal'
        };
        var NO_BIO = ['No separate collection', 'Bring point', 'Recycling centre',
                      'On demand kerbside collection', 'Home-composting'];
        return records.map(function (r) {
          var cls;
          if (NO_BIO.indexOf(r.bio_frequency) !== -1) {
            cls = 'no_bio_collection';
          } else {
            var b = TYPE_KEY[r.bio_frequency] || 'unknown';
            var re = TYPE_KEY[r.residual_frequency] || 'unknown';
            cls = 'bio_' + b + '_res_' + re;
          }
          return { catchment_id: r.catchment_id, _classified: cls };
        });
      }
    });
  });
  </script>
{% endblock atlas_config %}
