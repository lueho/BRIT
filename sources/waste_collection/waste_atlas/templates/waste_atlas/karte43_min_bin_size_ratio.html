{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2024,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      {% if nuts_level %}nutsLevel: parseInt('{{ nuts_level }}', 10),{% endif %}
      title:       'Verhältnis der kleinsten Behältergrößen (Bio / Rest)',
      dataUrl:     '/waste_collection/api/waste-atlas/min-bin-size-ratio/',
      dataField:   '_classified',
      categories: [
        { value: 'bio_larger',  label: 'Bio größer als Rest', color: '#1b9e77' },
        { value: 'same',        label: 'Bio und Rest gleich groß', color: '#7570b3' },
        { value: 'bio_smaller', label: 'Bio kleiner als Rest', color: '#d95f02' },
        { value: 'no_bio',      label: 'Keine Tür-zu-Tür-Bioabfallsammlung', color: '#fff696' }
      ],
      noDataColor: '#e0e0e0',
      noDataLabel: 'Keine Daten',
      legendTitle: 'Bio / Rest',
      fileBase:    'karte43_min_bin_size_ratio',
      transformData: function (records) {
        return records.map(function (r) {
          var cls;
          if (r.bio_is_door_to_door === false ||
              (r.bio_is_door_to_door == null && r.residual_min_bin_size != null)) {
            cls = 'no_bio';
          } else if (r.bio_min_bin_size === null || r.bio_min_bin_size === undefined) {
            cls = null;
          } else if (r.ratio === null || r.ratio === undefined) {
            cls = null;
          } else if (r.ratio > 1.05) {
            cls = 'bio_larger';
          } else if (r.ratio < 0.95) {
            cls = 'bio_smaller';
          } else {
            cls = 'same';
          }
          return { catchment_id: r.catchment_id, _classified: cls };
        });
      }
    });
  });
  </script>
{% endblock atlas_config %}
