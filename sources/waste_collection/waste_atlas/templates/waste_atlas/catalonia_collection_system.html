{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2024,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      {% if nuts_level %}nutsLevel: parseInt('{{ nuts_level }}', 10),{% endif %}
      title:       '{{ map_title }}',
      dataUrl:     '{{ data_url }}',
      dataField:   'collection_system',
      categories: [
        { value: 'Door to door',                       label: 'PAP total', color: '#d0fcd5' },
        { value: 'Mixed door-to-door and bring point', label: 'PAP parcial', color: '#a8e6cf' },
        { value: 'Bring point',                        label: 'Bring point', color: '#3dc7dc' },
        { value: 'No separate collection',             label: 'No separate collection', color: '#fff696' }
      ],
      noDataColor: '#e0e0e0',
      noDataLabel: 'No data',
      legendTitle: 'Collection system',
      fileBase:    '{{ file_base }}'
    });
  });
  </script>
{% endblock atlas_config %}
