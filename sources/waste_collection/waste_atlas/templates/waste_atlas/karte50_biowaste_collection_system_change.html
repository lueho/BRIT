{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_selector %}
  {% include "waste_atlas/includes/change_map_selector.html" with atlas_selector_bootstrap=False atlas_selector_button_label="Compare" %}
{% endblock atlas_selector %}

{% block atlas_config %}
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ to_year }}', 10) || 2024,
      fromYear:    parseInt('{{ from_year }}', 10) || 2023,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      {% if nuts_level %}nutsLevel: parseInt('{{ nuts_level }}', 10),{% endif %}
      title:       'Biowaste collection system changes ({{ from_year }} → {{ to_year }})',
      dataUrl:     '{{ data_url }}',
      dataField:   'change_type',
      categories: [
        { value: 'no_change',  label: 'No change',               color: '#c8e6c9' },
        { value: 'changed',    label: 'Changed',                 color: '#ffb74d' },
        { value: 'new',        label: 'New in {{ to_year }}',    color: '#64b5f6' },
        { value: 'removed',    label: 'Removed in {{ to_year }}', color: '#bdbdbd' }
      ],
      noDataColor: '#e0e0e0',
      noDataLabel: 'No data',
      legendTitle: 'Change',
      fileBase:    'biowaste_collection_system_change_{{ from_year }}_{{ to_year }}'
    });
  });
  </script>
{% endblock atlas_config %}
