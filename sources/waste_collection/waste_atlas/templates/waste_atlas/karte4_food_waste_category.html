{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
<script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2024,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      {% if nuts_level %}nutsLevel: parseInt('{{ nuts_level }}', 10),{% endif %}
      title:       'Accepted food waste im Biowaste',
      dataUrl:     '/waste_collection/api/waste-atlas/food-waste-category/',
      dataField:   'food_waste_category',
      categories: [
        { value: 'All four materials',      label: 'All food waste',          color: '#2c7da0' },
        { value: 'No raw meat',             label: 'No raw animal products',   color: '#61a35c' },
        { value: 'No meat',                 label: 'No animal products',         color: '#41b6c4' },
        { value: 'Only raw plant-based',    label: 'Only raw plant-based products',     color: '#9ac93e' },
        { value: 'No separate collection',  label: 'No separate biowaste collection',  color: '#fff696' }
      ],
      noDataColor: '#e0e0e0',
      noDataLabel: 'No data',
      legendTitle: 'Accepted food waste',
      fileBase:    'food_waste_category'
    });
  });
</script>
{% endblock atlas_config %}
