{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
<script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2023,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      {% if nuts_level %}nutsLevel: parseInt('{{ nuts_level }}', 10),{% endif %}
      title:       'Use of plastic bags for biowaste collection',
      dataUrl:     '/waste_collection/api/waste-atlas/regular-plastic-bags/',
      dataField:   'status',
      categories: [
        { value: 'allowed',                label: 'Allowed',                           color: '#fdd835' },
        { value: 'forbidden',              label: 'Forbidden',                          color: '#78909c' },
        { value: 'No separate collection', label: 'No separate biowaste collection', color: '#fff696' }
      ],
      noDataColor: '#e0e0e0',
      noDataLabel: 'No data',
      legendTitle: 'Plastic bags',
      fileBase:    'map47_plastic_bags_denmark'
    });
  });
</script>
{% endblock atlas_config %}
