{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
<script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2024,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      {% if nuts_level %}nutsLevel: parseInt('{{ nuts_level }}', 10),{% endif %}
      title:       'Collection frequency setting for residual waste collection',
      dataUrl:     '/waste_collection/api/waste-atlas/residual-frequency-type/',
      dataField:   'frequency_type',
      categories: [
        { value: 'Fixed-Seasonal', label: 'Seasonally varying', color: '#2e8b57' },
        { value: 'Fixed-Flexible', label: 'Flexible',            color: '#4169e1' },
        { value: 'Fixed',          label: 'Fixed',               color: '#b0b0ff' }
      ],
      noDataColor: '#e0e0e0',
      noDataLabel: 'No data',
      legendTitle: 'Collection frequency setting',
      fileBase:    'residual_collection_schedule'
    });
  });
</script>
{% endblock atlas_config %}
