{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2024,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      {% if nuts_level %}nutsLevel: parseInt('{{ nuts_level }}', 10),{% endif %}
      title:       'Access control for biowaste collection',
      dataUrl:     '/waste_collection/api/waste-atlas/access-control/',
      dataField:   'access_control',
      categories: [
        { value: 'Bring point and door-to-door access-controlled', label: 'Bring point and door-to-door access-controlled', color: '#14532d' },
        { value: 'Bring point access-controlled', label: 'Bring point access-controlled', color: '#22c55e' },
        { value: 'Door-to-door access-controlled', label: 'Door-to-door access-controlled', color: '#86efac' },
        { value: 'Bring point access-controlled, door-to-door not access-controlled', label: 'Bring point access-controlled, door-to-door not access-controlled', color: '#65a30d' },
        { value: 'Door-to-door access-controlled, bring point not access-controlled', label: 'Door-to-door access-controlled, bring point not access-controlled', color: '#a3e635' },
        { value: 'No access control', label: 'No access control', color: '#facc15' },
        { value: 'No separate collection', label: 'No separate biowaste collection', color: '#fff696' }
      ],
      noDataColor: '#e0e0e0',
      noDataLabel: 'No data',
      legendTitle: 'Access control',
      fileBase:    'access_control'
    });
  });
  </script>
{% endblock %}
