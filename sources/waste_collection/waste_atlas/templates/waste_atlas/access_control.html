{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2024,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      {% if nuts_level %}nutsLevel: parseInt('{{ nuts_level }}', 10),{% endif %}
      title:       'Access control for biowaste collection',
      dataUrl:     '/waste_collection/api/waste-atlas/access-control/',
      dataField:   'access_control',
      categories: [
        { value: 'Bring point: yes', label: 'Bring point: yes', color: '#1b9e77' },
        { value: 'Bring point: no', label: 'Bring point: no', color: '#a6dba0' },
        { value: 'Door-to-door: yes', label: 'Door-to-door: yes', color: '#2166ac' },
        { value: 'Door-to-door: no', label: 'Door-to-door: no', color: '#92c5de' },
        { value: 'Bring point: yes | Door-to-door: yes', label: 'Bring point: yes | Door-to-door: yes', color: '#542788' },
        { value: 'Bring point: no | Door-to-door: no', label: 'Bring point: no | Door-to-door: no', color: '#c2a5cf' },
        { value: 'Bring point: yes | Door-to-door: no', label: 'Bring point: yes | Door-to-door: no', color: '#b2182b' },
        { value: 'Bring point: no | Door-to-door: yes', label: 'Bring point: no | Door-to-door: yes', color: '#ef8a62' },
        { value: 'No separate biowaste collection', label: 'No separate biowaste collection', color: '#fff696' }
      ],
      noDataColor: '#e0e0e0',
      noDataLabel: 'No data',
      legendTitle: 'Access control',
      fileBase:    'access_control'
    });
  });
  </script>
{% endblock atlas_config %}
