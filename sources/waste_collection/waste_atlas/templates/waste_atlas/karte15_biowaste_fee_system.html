{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2024,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      nutsLevel:    parseInt('{{ nuts_level|default:"1" }}', 10),
      title:       'Fee system for biowaste collection',
      dataUrl:     '/waste_collection/api/waste-atlas/biowaste-fee-system/',
      dataField:   'fee_system',
      categories: [
        { value: 'Flat fee',                label: 'Flat rate',                         color: '#228B22' },
        { value: 'Flexible',                label: 'Flexible',                          color: '#00ced1' },
        { value: 'Flexible+',               label: 'Flexible+',                         color: '#FFD700' },
        { value: 'Pay as you throw (PAYT)', label: 'Pay as you throw',                  color: '#4b2a60' },
        { value: 'No fee',                  label: 'No fee',                       color: '#e41a1c' },
        { value: 'No separate collection',  label: 'No separate biowaste collection',   color: '#FFF696' }
      ],
      noDataColor: '#e0e0e0',
      noDataLabel: 'No data',
      legendTitle: 'Fee system',
      fileBase:    'biowaste_fee_system'
    });
  });
  </script>
{% endblock atlas_config %}
