{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
<script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2023,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      {% if nuts_level %}nutsLevel: parseInt('{{ nuts_level }}', 10),{% endif %}
      title:       'Accepted materials for biowaste collection aids',
      dataUrl:     '/waste_collection/api/waste-atlas/collection-support/',
      dataField:   '_classified',
      categories: [
        { value: 'paper_a_plastic_a', label: 'Paper allowed, compostable plastic bags allowed',       color: '#4caf50' },
        { value: 'paper_f_plastic_a', label: 'Paper forbidden, compostable plastic bags allowed',      color: '#fdd835' },
        { value: 'paper_a_plastic_f', label: 'Paper allowed, compostable plastic bags forbidden',      color: '#2196f3' },
        { value: 'paper_a_plastic_n', label: 'Paper allowed, compostable plastic bags unknown',   color: '#90caf9' },
        { value: 'paper_f_plastic_f', label: 'Paper forbidden, compostable plastic bags forbidden',     color: '#7e57c2' },
        { value: 'paper_n_plastic_f', label: 'Paper unknown, compostable plastic bags forbidden',  color: '#ff7043' },
        { value: 'no_collection',     label: 'No separate Biowaste collection',  color: '#fff696' }
      ],
      noDataColor: '#ffffff',
      noDataLabel: 'No data',
      legendTitle: 'Collection aids',
      fileBase:    'map48_collection_aids_denmark',
      transformData: function (records) {
        var KEY_MAP = {
          'allowed':  'a',
          'forbidden': 'f',
          'no_data':  'n'
        };
        return records.map(function (r) {
          var cls;
          if (r.paper_bags === 'no_collection') {
            cls = 'no_collection';
          } else {
            var p = KEY_MAP[r.paper_bags] || 'n';
            var b = KEY_MAP[r.plastic_bags] || 'n';
            cls = 'paper_' + p + '_plastic_' + b;
          }
          return { catchment_id: r.catchment_id, _classified: cls };
        });
      }
    });
  });
</script>
{% endblock atlas_config %}
