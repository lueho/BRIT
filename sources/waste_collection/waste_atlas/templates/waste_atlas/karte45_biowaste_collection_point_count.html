{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2024,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      {% if nuts_level %}nutsLevel: parseInt('{{ nuts_level }}', 10),{% endif %}
      title:       'Number of biowaste collection points',
      dataUrl:     '/waste_collection/api/waste-atlas/biowaste-collection-point-count/',
      dataField:   '_classified',
      categories: [
        { value: 'very_high', label: '≥ 59',                              color: '#005a32' },
        { value: 'high',      label: '10 – 58',                           color: '#31a354' },
        { value: 'medium',    label: '2 – 9',                             color: '#74c476' },
        { value: 'very_low',  label: 'Collection points, but no data',    color: '#edf8e9' },
        { value: 'full_dtd',  label: 'Full door to door / no data',       color: '#ffffd4' }
      ],
      noDataColor: '#e0e0e0',
      noDataLabel: 'No data',
      legendTitle: 'Biowaste collection points',
      fileBase:    'biowaste_collection_point_count',
      transformData: function (records) {
        return records.map(function (r) {
          var value = r.collection_point_count;
          var cls;
          if (value === null || value === undefined) {
            cls = r.is_door_to_door ? 'full_dtd' : null;
          } else if (value >= 59) {
            cls = 'very_high';
          } else if (value >= 10) {
            cls = 'high';
          } else if (value >= 2) {
            cls = 'medium';
          } else {
            cls = 'very_low';
          }
          return { catchment_id: r.catchment_id, _classified: cls };
        });
      }
    });
  });
  </script>
{% endblock atlas_config %}
