{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2024,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      {% if nuts_level %}nutsLevel: parseInt('{{ nuts_level }}', 10),{% endif %}
      title:       'Annual collection count: biowaste vs residual waste',
      dataUrl:     '/waste_collection/api/waste-atlas/combined-collection-count/',
      dataField:   '_classified',
      categories: [
        { value: 'bio_more_res_more',     label: 'Biowaste more often, residual waste more often',           color: '#64427b' },
        { value: 'bio_more_res_bi',       label: 'Biowaste more often, residual waste every two weeks', color: '#9c67a5' },
        { value: 'bio_more_res_less',     label: 'Biowaste more often, residual waste less frequent',         color: '#c5a5cf' },
        { value: 'bio_bi_res_more',       label: 'Biowaste every two weeks, residual waste more often', color: '#2862a8' },
        { value: 'bio_bi_res_bi',         label: 'Biowaste every two weeks, residual waste every two weeks', color: '#4292c6' },
        { value: 'bio_bi_res_less',       label: 'Biowaste every two weeks, residual waste less frequent', color: '#73b2d8' },
        { value: 'bio_less_res_more',     label: 'Biowaste less frequent, residual waste more often',         color: '#e33e88' },
        { value: 'bio_less_res_bi',       label: 'Biowaste less frequent, residual waste every two weeks', color: '#ff7986' },
        { value: 'bio_less_res_less',     label: 'Biowaste less frequent, residual waste less frequent',      color: '#f7b1b8' },
        { value: 'no_bio',               label: 'No door-to-door biowaste collection', color: '#fff696' }
      ],
      noDataColor: '#e0e0e0',
      noDataLabel: 'No data',
      legendTitle: 'Collection count',
      fileBase:    'combined_collection_count',
      transformData: function (records) {
        function bucket(count) {
          if (count === null || count === undefined) return null;
          if (count > 26) return 'more';
          if (count >= 24) return 'bi';
          return 'less';
        }
        return records.map(function (r) {
          var b = bucket(r.bio_count);
          var re = bucket(r.residual_count);
          var cls;
          if (r.bio_is_door_to_door === false ||
              (r.bio_is_door_to_door == null && r.residual_count != null)) {
            cls = 'no_bio';
          } else if (b === null) {
            cls = null;
          } else if (re === null) {
            cls = null;
          } else {
            cls = 'bio_' + b + '_res_' + re;
          }
          return { catchment_id: r.catchment_id, _classified: cls };
        });
      }
    });
  });
  </script>
{% endblock atlas_config %}
