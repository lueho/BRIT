{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2023,
      title:       'Sorting methods of waste fractions',
      dataUrl:     '/waste_collection/api/waste-atlas/bin-configuration/',
      dataField:   'bin_configuration',
      categories: [
        { value: 'Separate bins', label: 'Separate bins', color: '#4dbf8b' },
        { value: 'Optical bag sorting', label: 'Optical bag sorting', color: '#66a3ff' },
        { value: 'Four compartments bin', label: 'Four compartments bin', color: '#f2a541' },
        { value: 'Two compartments bin', label: 'Two compartments bin', color: '#9c89d9' },
        { value: 'No separate collection', label: 'No separate collection', color: '#f7d154' },
        { value: 'no_data', label: 'No data reported', color: '#d0d0d0' }
      ],
      noDataColor: '#e0e0e0',
      noDataLabel: 'No data',
      legendTitle: 'Sorting method',
      fileBase:    'map34_bin_configuration_sweden'
    });
  });
  </script>
{% endblock atlas_config %}
