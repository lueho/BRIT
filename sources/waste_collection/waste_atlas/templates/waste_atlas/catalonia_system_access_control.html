{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2024,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      {% if nuts_level %}nutsLevel: parseInt('{{ nuts_level }}', 10),{% endif %}
      title:       'Collection system and access/use control',
      dataUrl:     '/waste_collection/api/waste-atlas/catalonia-system-access-control/',
      dataField:   'access_control',
      categories: [
        { value: 'Bring point + access control', label: 'Bring point + access control', exportLabel: 'BP + access', color: '#238b45' },
        { value: 'Bring point + no access control', label: 'Bring point + no access control', exportLabel: 'BP + no access', color: '#a1d99b' },
        { value: 'PAP + use control', label: 'PAP + use control', color: '#2b8cbe' },
        { value: 'PAP + no use control', label: 'PAP + no use control', color: '#a6bddb' },
        { value: 'Other combination', label: 'Other combination', color: '#bdbdbd' }
      ],
      noDataColor: '#e0e0e0',
      noDataLabel: 'No data',
      legendTitle: 'System + access/use control',
      fileBase:    'catalonia_system_access_control'
    });
  });
  </script>
{% endblock atlas_config %}
