{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2024,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      nutsLevel:    parseInt('{{ nuts_level|default:"1" }}', 10),
      title:       'Smallest available bin size for biowaste (L)',
      dataUrl:     '/waste_collection/api/waste-atlas/biowaste-min-bin-size/',
      dataField:   '_classified',
      categories: [
        { value: 'xs',      label: '≤ 26.5 L',   color: '#d9f0d3' },
        { value: 'small',   label: '27 – 60 L',   color: '#a6d96a' },
        { value: 'medium',  label: '61 – 120 L',  color: '#1a9850' },
        { value: 'large',   label: '121 – 140 L', color: '#006837' },
        { value: 'no_door_to_door', label: 'No door to door biowaste collection', color: '#fff696' }
      ],
      noDataColor: '#e0e0e0',
      noDataLabel: 'No data',
      legendTitle: 'Min. bin size (L)',
      fileBase:    'biowaste_min_bin_size',
      transformData: function (records) {
        return records.map(function (r) {
          var cls;
          if (r.is_door_to_door === false) {
            cls = 'no_door_to_door';
          } else if (r.min_bin_size === null) {
            cls = null;
          } else if (r.min_bin_size <= 26.5) {
            cls = 'xs';
          } else if (r.min_bin_size <= 60) {
            cls = 'small';
          } else if (r.min_bin_size <= 120) {
            cls = 'medium';
          } else {
            cls = 'large';
          }
          return { catchment_id: r.catchment_id, _classified: cls };
        });
      }
    });
  });
  </script>
{% endblock atlas_config %}
