{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2024,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      {% if nuts_level %}nutsLevel: parseInt('{{ nuts_level }}', 10),{% endif %}
      title:       'Number of residual-waste collection points',
      dataUrl:     '/waste_collection/api/waste-atlas/residual-collection-point-count/',
      dataField:   '_classified',
      categories: [
        { value: 'very_high', label: '≥ 121',                             color: '#67000d' },
        { value: 'high',      label: '59 – 120',                          color: '#cb181d' },
        { value: 'medium',    label: '8 – 58',                            color: '#fc9272' },
        { value: 'low',       label: '1 – 7',                             color: '#fee0d2' },
        { value: 'full_dtd',  label: 'Full door to door / no data',       color: '#ffffd4' }
      ],
      noDataColor: '#e0e0e0',
      noDataLabel: 'No data',
      legendTitle: 'Residual collection points',
      fileBase:    'residual_collection_point_count',
      transformData: function (records) {
        return records.map(function (r) {
          var value = r.collection_point_count;
          var cls;
          if (value === null || value === undefined) {
            cls = r.is_door_to_door ? 'full_dtd' : null;
          } else if (value >= 121) {
            cls = 'very_high';
          } else if (value >= 59) {
            cls = 'high';
          } else if (value >= 8) {
            cls = 'medium';
          } else {
            cls = 'low';
          }
          return { catchment_id: r.catchment_id, _classified: cls };
        });
      }
    });
  });
  </script>
{% endblock atlas_config %}
