{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2024,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      nutsLevel:    parseInt('{{ nuts_level|default:"1" }}', 10),
      title:       'Specifically collected amount of residual waste',
      dataUrl:     '/waste_collection/api/waste-atlas/residual-collection-amount/',
      dataField:   '_classified',
      categories: [
        { value: 'high',      label: '226–311 kg (high)',       color: '#d95f0e' },
        { value: 'medium',    label: '151–225 kg (medium)',     color: '#fe9929' },
        { value: 'low',       label: '76–150 kg (low)',       color: '#fed98e' },
        { value: 'very_low',  label: '0 – 75 kg (Very low)',    color: '#ffffd4' }
      ],
      noDataColor: '#e0e0e0',
      noDataLabel: 'No data',
      legendTitle: 'Collected amount (kg/cap/a)',
      fileBase:    'residual_collection_amount',
      transformData: function (records) {
        return records.map(function (r) {
          var cls;
          if (r.amount === null) {
            cls = null;
          } else if (r.amount > 225) {
            cls = 'high';
          } else if (r.amount > 150) {
            cls = 'medium';
          } else if (r.amount > 75) {
            cls = 'low';
          } else {
            cls = 'very_low';
          }
          return { catchment_id: r.catchment_id, _classified: cls };
        });
      }
    });
  });
  </script>
{% endblock atlas_config %}
