{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2024,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      {% if nuts_level %}nutsLevel: parseInt('{{ nuts_level }}', 10),{% endif %}
      title:       'Annual biowaste collection count',
      dataUrl:     '/waste_collection/api/waste-atlas/biowaste-collection-count/',
      dataField:   '_classified',
      categories: [
        { value: 'twice_weekly',    label: '104 per year (2× per week)',           color: '#08519c' },
        { value: 'weekly',          label: '52 per year (weekly)',                  color: '#1E90FF' },
        { value: 'biweekly',        label: '26 per year (every 2 weeks)',           color: '#66CDAA' },
        { value: 'less_frequent',   label: 'Less than 26 per year',                color: '#4b2a60' },
        { value: 'seasonal',        label: 'Seasonally varying (17 – 61 per year)', color: '#F4A460' },
        { value: 'no_door_to_door', label: 'No door to door biowaste collection',  color: '#FFF696' }
      ],
      noDataColor: '#e0e0e0',
      noDataLabel: 'No data',
      legendTitle: 'Collection count',
      fileBase:    'biowaste_collection_count',
      transformData: function (records) {
        return records.map(function (r) {
          var cls;
          if (r.is_door_to_door === false) {
            cls = 'no_door_to_door';
          } else if (r.collection_count === null) {
            cls = null;
          } else if (r.has_seasonal_variation) {
            cls = 'seasonal';
          } else if (r.collection_count >= 90) {
            cls = 'twice_weekly';
          } else if (r.collection_count >= 40) {
            cls = 'weekly';
          } else if (r.collection_count >= 20) {
            cls = 'biweekly';
          } else {
            cls = 'less_frequent';
          }
          return { catchment_id: r.catchment_id, _classified: cls };
        });
      }
    });
  });
  </script>
{% endblock atlas_config %}
