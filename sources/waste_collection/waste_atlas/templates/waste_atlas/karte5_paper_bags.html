{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2024,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      nutsLevel:    parseInt('{{ nuts_level|default:"1" }}', 10),
      title:       'Use of paper bags for biowaste collection',
      dataUrl:     '/waste_collection/api/waste-atlas/paper-bags/',
      dataField:   'status',
      categories: [
        { value: 'allowed',                label: 'Allowed',                            color: '#2196f3' },
        { value: 'forbidden',              label: 'Forbidden',                           color: '#f57c00' },
        { value: 'No separate collection', label: 'No separate biowaste collection',  color: '#fff696' }
      ],
      noDataColor: '#ffffff',
      noDataLabel: 'No data',
      legendTitle: 'Paper bags',
      fileBase:    'paper_bags'
    });
  });
  </script>
{% endblock atlas_config %}
