{% extends "waste_atlas/choropleth_map.html" %}

{% block atlas_config %}
  <script>
  document.addEventListener('DOMContentLoaded', function () {
    WasteAtlasChoropleth.init({
      svgId:       'atlas-svg',
      containerId: 'map-container',
      loadingId:   'loading-overlay',
      country:     '{{ country }}',
      year:        parseInt('{{ year }}', 10) || 2024,
      {% if nuts_prefix %}nutsPrefix: '{{ nuts_prefix }}',{% endif %}
      {% if nuts_level %}nutsLevel: parseInt('{{ nuts_level }}', 10),{% endif %}
      title:       'Annual collection-count ratio: biowaste vs residual waste',
      dataUrl:     '/waste_collection/api/waste-atlas/collection-count-ratio/',
      dataField:   '_classified',
      categories: [
        { value: 'bio_more', label: 'Biowaste collected more often than residual waste', exportLabel: 'Bio more often', color: '#1b9e77' },
        { value: 'same',     label: 'Biowaste and residual waste collected equally often', exportLabel: 'Equal frequency', color: '#7570b3' },
        { value: 'bio_less', label: 'Biowaste collected less often than residual waste', exportLabel: 'Bio less often', color: '#d95f02' },
        { value: 'no_bio',   label: 'No door-to-door biowaste collection', exportLabel: 'No D2D bio', color: '#fff696' }
      ],
      noDataColor: '#e0e0e0',
      noDataLabel: 'No data',
      legendTitle: 'Biowaste / residual waste',
      fileBase:    'collection_count_ratio',
      transformData: function (records) {
        return records.map(function (r) {
          var cls;
          if (r.bio_is_door_to_door === false ||
              (r.bio_is_door_to_door == null && r.residual_count != null)) {
            cls = 'no_bio';
          } else if (r.bio_count === null || r.bio_count === undefined) {
            cls = null;
          } else if (r.ratio === null || r.ratio === undefined) {
            cls = null;
          } else if (r.ratio > 1.05) {
            cls = 'bio_more';
          } else if (r.ratio < 0.95) {
            cls = 'bio_less';
          } else {
            cls = 'same';
          }
          return { catchment_id: r.catchment_id, _classified: cls };
        });
      }
    });
  });
  </script>
{% endblock atlas_config %}
