repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
# Pre-commit hooks ensure code is properly formatted before commit.
# Install hooks: pre-commit install
# Run manually: pre-commit run --all-files
